<!DOCTYPE html>
<html>
<head>
    <title>Fake News Analyzer</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f4f4;
        }

        .box {
            margin-top: 100px;
            padding: 20px;
            background: white;
            width: 420px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        pre {
            text-align: left;
            background: #eee;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📰 Fake News Analyzer</h2>

    <input type="text" id="text" placeholder="Enter news text" />
    <br>

    <button onclick="analyze()">Analyze</button>

    <h3>Prediction:</h3>
    <p id="result">-</p>

    <h3>Word Count (Hadoop Output):</h3>
    <pre id="output">-</pre>
</div>

<script>
async function analyze() {
    const text = document.getElementById("text").value;

    if (!text) {
        alert("Please enter text!");
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        const data = await res.json();

        console.log(data); // debug

        // ✅ COLOR LOGIC
        let resText = data.result;
        let color = "black";

        if (resText === "FAKE") color = "red";
        else if (resText === "REAL") color = "green";
        else color = "orange";

        document.getElementById("result").innerHTML =
            `<span style="color:${color}; font-weight:bold;">${resText}</span>`;

        // ✅ Hadoop output
        document.getElementById("output").innerText = data.hadoop_output;

    } catch (error) {
        console.error(error);
        document.getElementById("result").innerText = "Error connecting to server";
        document.getElementById("output").innerText = "-";
    }
}
</script>

</body>
</html>
